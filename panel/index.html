<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel de Anuncios</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0a;--panel:#111;--border:#1e1e1e;--input:#1a1a1a;--accent:#00d4ff;--purple:#7b2ff7}
  body{background:var(--bg);color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── Header ── */
  .header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel)}
  .header h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header .url-live{font-size:11px;color:#444}

  /* ── Layout ── */
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:360px;min-width:320px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .preview{flex:1;display:flex;flex-direction:column;overflow:hidden}

  /* ── Tabs ── */
  .tabs{display:flex;border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:10px 4px;background:transparent;border:none;color:#555;cursor:pointer;font-size:12px;font-weight:400;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
  .tab.active{color:#fff;font-weight:600;background:#1a1a1a;border-bottom:2px solid var(--accent)}

  /* ── Editor ── */
  .editor{flex:1;overflow-y:auto;padding:16px}
  .editor::-webkit-scrollbar{width:4px}
  .editor::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .field label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.08em}
  .field input,.field textarea,.field select{background:var(--input);border:1px solid #2a2a2a;border-radius:8px;color:#fff;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
  .field input:focus,.field textarea:focus{border-color:#333}
  .field textarea{resize:vertical;min-height:70px}
  .color-row{display:flex;align-items:center;gap:8px}
  .color-row input[type=color]{width:36px;height:34px;border:none;background:none;cursor:pointer;padding:0;border-radius:6px}
  .color-row input[type=text]{flex:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  /* Platillos */
  .platillo-row{display:grid;grid-template-columns:38px 1fr 1fr 60px;gap:6px;align-items:center;background:#0d0d0d;border-radius:8px;padding:8px;margin-bottom:6px}
  .platillo-row input{background:var(--input);border:1px solid #222;border-radius:6px;color:#fff;padding:5px 6px;font-size:12px;font-family:inherit;outline:none;width:100%}
  .platillo-row .emoji-input{text-align:center;font-size:16px}
  .precio-wrap{display:flex;align-items:center;gap:3px}
  .precio-wrap span{color:#555;font-size:12px}

  /* ── Publicar ── */
  .publish-area{padding:14px 16px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
  .token-row{display:flex;gap:6px}
  .token-row input{flex:1;background:var(--input);border:1px solid #2a2a2a;border-radius:8px;color:#fff;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
  .btn-eye{background:var(--input);border:1px solid #2a2a2a;border-radius:8px;color:#888;cursor:pointer;padding:0 10px;font-size:14px}
  .btn-publish{background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:10px;color:#fff;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:opacity .2s}
  .btn-publish:disabled{opacity:.5;cursor:wait}
  .status{padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5}
  .status.ok{background:#0a2a1a;border:1px solid #22c55e33;color:#4ade80}
  .status.err{background:#2a0a0a;border:1px solid #ef444433;color:#f87171}
  .status a{color:#22d3ee;font-size:12px;display:block;margin-top:4px}

  /* ── Preview barra ── */
  .preview-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--panel)}
  .dot{width:10px;height:10px;border-radius:50%}
  .preview-url{font-size:11px;color:#444;margin-left:6px}
  .preview iframe{flex:1;border:none;background:#000;width:100%;height:100%}
  .preview{overflow:hidden}
  iframe{display:block}

  /* Sección label */
  .section-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #1a1a1a}
</style>
</head>
<body>

<div class="header">
  <h1>📺 Panel de Anuncios</h1>
  
</div>

<div class="main">

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="tabs">
      <button class="tab active" onclick="cambiarTipo('menu')">🍽️ Menú</button>
      <button class="tab" onclick="cambiarTipo('promo')">🏷️ Promo</button>
      <button class="tab" onclick="cambiarTipo('cumple')">🎂 Cumple</button>
    </div>

    <div class="editor" id="editor"></div>

    <div class="publish-area">
      <div class="field">
        <label>Carpeta / nombre del cliente</label>
        <input id="carpeta" value="mi-negocio" oninput="sanitizeCarpeta(this)" placeholder="ej: loncheria-flor">
      </div>
      <div class="field">
        <label>Token GitHub</label>
        <div class="token-row">
          <input type="password" id="token" placeholder="ghp_...">
          <button class="btn-eye" onclick="toggleToken()">👁️</button>
        </div>
      </div>
      <button class="btn-publish" id="btnPublish" onclick="publicar()">🚀 Publicar en GitHub Pages</button>
      <div id="statusBox" style="display:none"></div>
    </div>
  </div>

  <!-- ── Preview ── -->
  <div class="preview" style="display:flex;flex-direction:column">
    <div class="preview-bar">
      <div class="dot" style="background:#ef4444"></div>
      <div class="dot" style="background:#f59e0b"></div>
      <div class="dot" style="background:#22c55e"></div>
      <span class="preview-url" id="previewUrl">vista previa · Smart TV</span>
    </div>
    <iframe id="preview" sandbox="allow-scripts" style="flex:1"></iframe>
  </div>

</div>

<script>
// ─── Estado ────────────────────────────────────────────────────────────────
const GH_USER = 'ogarciabrena';
const GH_REPO = 'anuncios';

let tipo = 'menu';
let estado = {
  menu: {
    negocio:'Lonchería Flor de Azalea', bgColor:'#1a0a00', accentColor:'#f59e0b',
    platillos:[
      {emoji:'🍲',nombre:'Sopa del Día',desc:'Caldo de res con verduras',precio:'35'},
      {emoji:'🍛',nombre:'Plato Fuerte',desc:'Pollo estofado con arroz',precio:'70'},
      {emoji:'🫘',nombre:'Guisado',desc:'Frijoles con chorizo',precio:'45'},
      {emoji:'🥤',nombre:'Agua Fresca',desc:'Jamaica · Horchata · Limón',precio:'20'},
      {emoji:'🌮',nombre:'Taco de Guisado',desc:'3 tacos con salsa',precio:'40'},
      {emoji:'🍮',nombre:'Postre',desc:'Flan napolitano casero',precio:'25'},
    ]
  },
  promo:{
    negocio:'Patrick Burger', bgColor:'#0d001a', accentColor:'#a855f7',
    etiqueta:'Oferta Especial', titulo:'2x1 en Burgers',
    descripcion:'Dos hamburguesas dobles al precio de una\nLunes a Miércoles',
    precioAntes:'$120 c/u', precioAhora:'$120 las 2',
    vigencia:'Válido del 16 al 18 de junio 2026'
  },
  cumple:{
    bgColor:'#0a0020', emoji:'🎂', nombre:'María',
    mensaje:'Hoy es un día muy especial.\nTe deseamos todo lo mejor en este nuevo año de vida. 🎉',
    deParte:'El equipo de Flor de Azalea',
    color1:'#fbbf24', color2:'#f472b6', color3:'#818cf8'
  }
};

// ─── Generadores HTML ───────────────────────────────────────────────────────
function htmlMenu(d){
  const items = d.platillos.map(p=>`
    <div class="item">
      <span class="emoji">${p.emoji}</span>
      <h3>${p.nombre}</h3>
      <p>${p.desc}</p>
      <span class="precio">$${p.precio}</span>
    </div>`).join('');
  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${d.negocio} · Menú</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:${d.bgColor};color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow:hidden}
.logo{font-size:1rem;color:${d.accentColor};letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem}
h1{font-family:'Playfair Display',serif;font-size:3.2rem;color:${d.accentColor};margin-bottom:.2rem;text-align:center}
.fecha{color:${d.accentColor}99;margin-bottom:2rem;font-size:1rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;width:100%;max-width:1100px}
.item{background:rgba(255,255,255,.06);border:1px solid ${d.accentColor}33;border-radius:14px;padding:1.5rem;display:flex;flex-direction:column;gap:.4rem}
.item .emoji{font-size:2.2rem}
.item h3{font-size:1.1rem;font-weight:600;color:${d.accentColor}dd}
.item p{color:#ffffff88;font-size:.88rem;line-height:1.5}
.item .precio{margin-top:auto;font-size:1.3rem;font-weight:700;color:${d.accentColor}}
</style></head><body>
<div class="logo">🍽️ ${d.negocio}</div>
<h1>Menú del Día</h1>
<p class="fecha" id="f"></p>
<div class="grid">${items}</div>
<script>
const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const d=new Date();
document.getElementById('f').textContent=dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' '+d.getFullYear();
try{document.documentElement.requestFullscreen();}catch(e){}
<\/script></body></html>`;
}

function htmlPromo(d){
  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${d.negocio} · Promoción</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:${d.bgColor};font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;text-align:center;padding:2rem}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,${d.accentColor}44 0%,${d.bgColor} 60%);z-index:0}
.content{position:relative;z-index:1}
.tag{background:${d.accentColor};color:#fff;font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.4rem 1.4rem;border-radius:999px;display:inline-block;margin-bottom:1.5rem}
h1{font-size:3.5rem;font-weight:900;color:#fff;line-height:1.1;margin-bottom:.5rem}
.subtitulo{font-size:1.4rem;color:#ffffffcc;margin-bottom:2rem;max-width:550px;line-height:1.6;white-space:pre-line}
.badge{background:${d.accentColor}22;border:2px solid ${d.accentColor};border-radius:20px;padding:1.5rem 3rem;display:inline-block;margin-bottom:1.5rem;animation:pulsar 2s infinite}
.precio-antes{color:#ffffff55;font-size:1.1rem;text-decoration:line-through}
.precio-ahora{color:#fff;font-size:3rem;font-weight:900}
.vigencia{color:${d.accentColor}cc;font-size:.9rem}
@keyframes pulsar{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style></head><body>
<div class="bg"></div>
<div class="content">
<span class="tag">⚡ ${d.etiqueta}</span>
<h1>${d.titulo}</h1>
<p class="subtitulo">${d.descripcion}</p>
<div class="badge">
<div class="precio-antes">${d.precioAntes}</div>
<div class="precio-ahora">${d.precioAhora}</div>
</div>
<p class="vigencia">📅 ${d.vigencia}</p>
</div>
<script>try{document.documentElement.requestFullscreen();}catch(e){}<\/script>
</body></html>`;
}

function htmlCumple(d){
  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>¡Feliz Cumpleaños ${d.nombre}!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:${d.bgColor};font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:2rem}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
.emoji-grande{font-size:5.5rem;animation:bounce 1s infinite alternate;display:block;margin-bottom:.5rem}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-18px)}}
h1{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,${d.color1},${d.color2},${d.color3});-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;line-height:1.1}
.nombre{font-size:5rem;font-weight:900;color:#fff;text-shadow:0 0 40px ${d.color1}88;margin-bottom:1rem}
.mensaje{font-size:1.2rem;color:#ffffffbb;max-width:500px;line-height:1.6;margin-bottom:1.5rem;white-space:pre-line}
.de-parte{color:#ffffff55;font-size:.95rem}
</style></head><body>
<canvas id="c"></canvas>
<div class="content">
<span class="emoji-grande">${d.emoji}</span>
<h1>¡Feliz Cumpleaños!</h1>
<div class="nombre">${d.nombre}</div>
<p class="mensaje">${d.mensaje}</p>
<p class="de-parte">Con cariño · ${d.deParte}</p>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
cv.width=innerWidth;cv.height=innerHeight;
window.addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight});
const cols=['${d.color1}','${d.color2}','${d.color3}','#fff','#fbbf24','#34d399'];
const pz=[];
for(let i=0;i<130;i++)pz.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight-innerHeight,w:7+Math.random()*9,h:7+Math.random()*9,c:cols[Math.floor(Math.random()*cols.length)],s:2+Math.random()*3,r:Math.random()*360,sp:Math.random()*6-3});
function draw(){ctx.clearRect(0,0,cv.width,cv.height);pz.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.y+=p.s;p.r+=p.sp;if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width}});requestAnimationFrame(draw)}
draw();
try{document.documentElement.requestFullscreen();}catch(e){}
<\/script></body></html>`;
}

function getHTML(){
  const d = estado[tipo];
  if(tipo==='menu') return htmlMenu(d);
  if(tipo==='promo') return htmlPromo(d);
  return htmlCumple(d);
}

// ─── Renderizar editor ──────────────────────────────────────────────────────
function field(id, label, value, extra=''){
  return `<div class="field"><label>${label}</label><input id="${id}" value="${esc(value)}" oninput="upd('${id}')" ${extra}></div>`;
}
function fieldTA(id, label, value){
  return `<div class="field"><label>${label}</label><textarea id="${id}" oninput="upd('${id}')">${esc(value)}</textarea></div>`;
}
function colorField(id, label, value){
  return `<div class="field"><label>${label}</label><div class="color-row"><input type="color" id="${id}_c" value="${value}" oninput="syncColor('${id}')"><input type="text" id="${id}" value="${value}" oninput="upd('${id}');syncColorPicker('${id}')"></div></div>`;
}
function esc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderEditor(){
  const d = estado[tipo];
  let html = '';
  if(tipo==='menu'){
    html += field('negocio','Nombre del negocio', d.negocio);
    html += `<div class="grid2">${colorField('bgColor','Color fondo',d.bgColor)}${colorField('accentColor','Color acento',d.accentColor)}</div>`;
    html += `<div class="section-label" style="margin-top:4px">Platillos</div>`;
    d.platillos.forEach((p,i)=>{
      html += `<div class="platillo-row">
        <input class="emoji-input" id="p${i}_emoji" value="${esc(p.emoji)}" oninput="updP(${i},'emoji')">
        <input id="p${i}_nombre" value="${esc(p.nombre)}" placeholder="Nombre" oninput="updP(${i},'nombre')">
        <input id="p${i}_desc" value="${esc(p.desc)}" placeholder="Descripción" oninput="updP(${i},'desc')">
        <div class="precio-wrap"><span>$</span><input id="p${i}_precio" value="${esc(p.precio)}" placeholder="00" oninput="updP(${i},'precio')"></div>
      </div>`;
    });
  } else if(tipo==='promo'){
    html += field('negocio','Nombre del negocio', d.negocio);
    html += `<div class="grid2">${colorField('bgColor','Color fondo',d.bgColor)}${colorField('accentColor','Color acento',d.accentColor)}</div>`;
    html += field('etiqueta','Etiqueta', d.etiqueta);
    html += field('titulo','Título principal', d.titulo);
    html += fieldTA('descripcion','Descripción', d.descripcion);
    html += `<div class="grid2">${field('precioAntes','Precio anterior', d.precioAntes)}${field('precioAhora','Precio promoción', d.precioAhora)}</div>`;
    html += field('vigencia','Vigencia', d.vigencia);
  } else {
    html += field('nombre','Nombre del festejado/a', d.nombre);
    html += field('emoji','Emoji principal', d.emoji);
    html += fieldTA('mensaje','Mensaje', d.mensaje);
    html += field('deParte','De parte de', d.deParte);
    html += colorField('bgColor','Color fondo', d.bgColor);
    html += `<div class="grid3">${colorField('color1','Color 1',d.color1)}${colorField('color2','Color 2',d.color2)}${colorField('color3','Color 3',d.color3)}</div>`;
  }
  document.getElementById('editor').innerHTML = html;
  updatePreview();
}

// ─── Sincronizar campos ─────────────────────────────────────────────────────
function upd(id){
  const el = document.getElementById(id);
  if(!el) return;
  estado[tipo][id] = el.value;
  updatePreview();
}
function updP(i, key){
  const el = document.getElementById(`p${i}_${key}`);
  if(!el) return;
  estado[tipo].platillos[i][key] = el.value;
  updatePreview();
}
function syncColor(id){
  const c = document.getElementById(id+'_c').value;
  document.getElementById(id).value = c;
  estado[tipo][id] = c;
  updatePreview();
}
function syncColorPicker(id){
  const v = document.getElementById(id).value;
  const cp = document.getElementById(id+'_c');
  if(cp && /^#[0-9a-fA-F]{6}$/.test(v)) cp.value = v;
}

// ─── Preview ────────────────────────────────────────────────────────────────
function updatePreview(){
  const carpeta = document.getElementById('carpeta')?.value || 'mi-negocio';
  document.getElementById('previewUrl').textContent = `ogarciabrena.github.io/anuncios/${carpeta}`;
  const iframe = document.getElementById('preview');
  iframe.srcdoc = getHTML();
}

// ─── Cambiar tipo ───────────────────────────────────────────────────────────
function cambiarTipo(t){
  tipo = t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active', ['menu','promo','cumple'][i]===t);
  });
  document.getElementById('statusBox').style.display='none';
  renderEditor();
}

// ─── Token toggle ───────────────────────────────────────────────────────────
function toggleToken(){
  const inp = document.getElementById('token');
  inp.type = inp.type==='password' ? 'text' : 'password';
}

// ─── Sanitizar carpeta ──────────────────────────────────────────────────────
function sanitizeCarpeta(el){
  el.value = el.value.toLowerCase().replace(/[^a-z0-9-]/g,'-');
  updatePreview();
}

// ─── Publicar ───────────────────────────────────────────────────────────────
async function publicar(){
  const token = document.getElementById('token').value.trim();
  const carpeta = document.getElementById('carpeta').value.trim();
  const statusBox = document.getElementById('statusBox');
  const btn = document.getElementById('btnPublish');

  if(!token){ showStatus('err','Ingresa tu token de GitHub'); return; }
  if(!carpeta){ showStatus('err','Ingresa el nombre de carpeta'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Publicando...';
  statusBox.style.display = 'none';

  try{
    const path = `${carpeta}/index.html`;
    const apiUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
    const headers = { Authorization:`token ${token}`, 'Content-Type':'application/json' };

    let sha;
    try{
      const check = await fetch(apiUrl, {headers});
      if(check.ok){ const j=await check.json(); sha=j.sha; }
    }catch(_){}

    const content = btoa(unescape(encodeURIComponent(getHTML())));
    const body = { message:`update: anuncio ${carpeta}`, content };
    if(sha) body.sha = sha;

    const res = await fetch(apiUrl, {method:'PUT', headers, body:JSON.stringify(body)});

    if(res.ok){
      const liveUrl = `https://${GH_USER}.github.io/${GH_REPO}/${carpeta}`;
      showStatus('ok', `✅ Publicado exitosamente<br><a href="${liveUrl}" target="_blank">Abrir ${liveUrl} →</a>`);
    } else {
      const e = await res.json();
      showStatus('err', 'Error: '+(e.message||'desconocido'));
    }
  }catch(err){
    showStatus('err','Error de red: '+err.message);
  }

  btn.disabled = false;
  btn.textContent = '🚀 Publicar en GitHub Pages';
}

function showStatus(type, msg){
  const box = document.getElementById('statusBox');
  box.className = 'status '+type;
  box.innerHTML = msg;
  box.style.display = 'block';
}

// ─── Init ───────────────────────────────────────────────────────────────────
renderEditor();
document.getElementById('carpeta').addEventListener('input', updatePreview);
</script>
</body>
