<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promoción Especial</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d001a;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#3b0764 0%,#0d001a 60%),radial-gradient(ellipse at 80% 20%,#1e1b4b 0%,transparent 60%);z-index:0}
  .content{position:relative;z-index:1;text-align:center;padding:2rem}
  .tag{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:.85rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.4rem 1.2rem;border-radius:999px;display:inline-block;margin-bottom:1.5rem}
  h1{font-size:5rem;font-weight:900;color:#fff;line-height:1;margin-bottom:.5rem}
  h1 span{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .desc{font-size:1.5rem;color:#c084fc;margin-bottom:2rem;max-width:600px}
  .badge{background:rgba(168,85,247,.15);border:2px solid #a855f7;border-radius:20px;padding:1.5rem 3rem;display:inline-block;margin-bottom:2rem}
  .badge .precio-antes{color:#6b21a8;font-size:1.2rem;text-decoration:line-through}
  .badge .precio-ahora{color:#f0abfc;font-size:3rem;font-weight:900}
  .vigencia{color:#7c3aed;font-size:.9rem}
  .pulsar{animation:pulsar 2s infinite}
  @keyframes pulsar{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <span class="tag">⚡ Oferta Especial</span>
  <h1>Patrick<br><span>Burger</span></h1>
  <p class="desc">2x1 en todas las hamburguesas dobles<br>de lunes a miércoles</p>
  <div class="badge pulsar">
    <div class="precio-antes">$120 c/u</div>
    <div class="precio-ahora">$120 las 2</div>
  </div>
  <p class="vigencia">📅 Válido del 16 al 18 de junio 2026 · Sólo en sucursal</p>
</div>
<script>try{document.documentElement.requestFullscreen();}catch(e){}</script>
</body>
</html>
